name: Test Google Workspace Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Smoke test imports
        run: |
          python -c "from google.oauth2.credentials import Credentials; from googleapiclient.discovery import build; print('Imports OK')"

      - name: Check setup.py help
        run: |
          python scripts/setup.py --help

      - name: Check google_api.py help
        run: |
          python scripts/google_api.py --help
