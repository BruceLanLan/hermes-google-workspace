name: Test Google Workspace Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Smoke test imports
        run: |
          python -c "from google.oauth2.credentials import Credentials; from googleapiclient.discovery import build; print('Imports OK')"

      - name: Check setup.py help
        run: |
          python scripts/setup.py --help

      - name: Check google_api.py help
        run: |
          python scripts/google_api.py --help

      - name: OAuth scopes must live only in scripts/scopes.py
        run: |
          python <<'PY'
          import pathlib
          import re
          bad = []
          for p in pathlib.Path("scripts").glob("*.py"):
              if p.name == "scopes.py":
                  continue
              text = p.read_text(encoding="utf-8")
              if re.search(r"^SCOPES\s*=\s*\[", text, re.M):
                  bad.append(p.name)
          if bad:
              raise SystemExit(f"Move SCOPES to scripts/scopes.py only; also found in: {bad}")
          PY

      - name: npx-style bins resolve to Python CLIs
        run: |
          node bin/gws.cjs calendar list --help
          node bin/gws-setup.cjs --help
