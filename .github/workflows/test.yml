name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Smoke test imports
        run: |
          python -c "from google.oauth2.credentials import Credentials; from googleapiclient.discovery import build; print('Imports OK')"

      - name: Run pytest
        run: pytest -q

      - name: OAuth scopes must live only in scripts/scopes.py
        shell: python
        run: |
          import pathlib, re, sys
          bad = []
          for p in pathlib.Path("scripts").glob("*.py"):
              if p.name == "scopes.py":
                  continue
              if re.search(r"^SCOPES\s*=\s*\[", p.read_text(encoding="utf-8"), re.M):
                  bad.append(p.name)
          if bad:
              sys.exit(f"Move SCOPES to scripts/scopes.py only; also found in: {bad}")

      - name: Entry points work
        run: |
          gws --version
          gws --help >/dev/null
          gws-setup --help >/dev/null

      - name: Script-mode still works
        run: |
          python scripts/setup.py --help >/dev/null
          python scripts/google_api.py --help >/dev/null

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npx-style bins resolve to Python CLIs
        run: |
          node bin/gws.cjs --help >/dev/null
          node bin/gws-setup.cjs --help >/dev/null
